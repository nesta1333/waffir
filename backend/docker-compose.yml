version: "3.9"

services:
  api:
    build: .
    ports:
      - "127.0.0.1:8000:8000"   # Bind to localhost only — not exposed externally
    env_file: .env
    depends_on:
      - postgres
      - redis
    volumes:
      - ./app:/app/app
      - browser_profiles:/app/browser_profiles
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: waffir
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_set_in_env}   # Set POSTGRES_PASSWORD in .env
      POSTGRES_DB: waffir
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"   # Localhost only — never expose to internet
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme_set_in_env}  # Auth required
    ports:
      - "127.0.0.1:6379:6379"   # Localhost only
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  pg_data:
  redis_data:
  browser_profiles:
